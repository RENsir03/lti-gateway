services:
  db:
    image: postgres:15-alpine
    container_name: moodle_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MYSQL_USER}
      POSTGRES_PASSWORD: ${MYSQL_PASSWORD}
      POSTGRES_DB: ${MYSQL_DATABASE}
    volumes:
      - moodle_db_data:/var/lib/postgresql/data
    networks:
      - moodle_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MYSQL_USER} -d ${MYSQL_DATABASE}"]
      timeout: 20s
      retries: 10
      interval: 5s

  moodle:
    image: erseco/alpine-moodle:latest
    container_name: moodle_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LANG: zh_CN.UTF-8
      LANGUAGE: zh_CN:zh
      SITE_URL: http://localhost:8080
      DB_TYPE: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_PREFIX: mdl_
      SSLPROXY: "false"
      MOODLE_EMAIL: ${MOODLE_ADMIN_EMAIL}
      MOODLE_LANGUAGE: zh_cn
      MOODLE_SITENAME: ${MOODLE_SITE_NAME}
      MOODLE_USERNAME: ${MOODLE_ADMIN_USER}
      MOODLE_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_SKIP_INSTALL: "false"
      MOODLE_SKIP_CHOWN: "false"
    volumes:
      - moodle_data:/var/www/html
      - moodledata_data:/var/www/moodledata
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodle_network

volumes:
  moodle_db_data:
  moodle_data:
  moodledata_data:

networks:
  moodle_network:
    driver: bridge
